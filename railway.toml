[build]
builder = "nixpacks"

[deploy]
startCommand = "python main.py"
healthcheckPath = "/livez"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# ── Variables critiques requises (valeurs dans le dashboard Railway) ────────────
# TELEGRAM_BOT_TOKEN           — token bot Telegram
# TELEGRAM_ALLOWED_USER_ID     — user ID autorisé
# ANTHROPIC_API_KEY            — clé Claude
# FRAMER_API_KEY               — clé API Framer CMS
# FRAMER_COLLECTION_ID         — ID collection journal (défaut: ERDJzzQHr)
# QBO_CLIENT_ID / QBO_CLIENT_SECRET / QBO_REALM_ID — QuickBooks
# OPENAI_API_KEY               — Whisper transcription vocale
# GOOGLE_SERVICE_ACCOUNT_JSON  — GA4 + Calendar
# GOOGLE_REFRESH_TOKEN / GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET — Gmail OAuth

# Cron job : réveille le CEO chaque matin lun-ven à 8h03 EST (13h03 UTC)
[[crons]]
schedule  = "3 13 * * 1-5"
command   = "python -c \"\nimport urllib.request, urllib.parse, json\nurl = 'http://localhost:$PORT/paperclip/ceo'\ndata = json.dumps({'context': {'wakeReason': 'morning_dispatch'}}).encode()\nreq = urllib.request.Request(url, data=data, headers={'Content-Type': 'application/json', 'Authorization': 'Bearer ' + __import__('os').environ.get('PAPERCLIP_WEBHOOK_SECRET', '')})\nresp = urllib.request.urlopen(req, timeout=400)\nprint(resp.read().decode()[:500])\n\""
