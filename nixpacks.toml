[phases.setup]
cmds = [
  "apt-get update -qq && apt-get install -y curl",
  "curl -fsSL https://deb.nodesource.com/setup_20.x | bash -",
  "apt-get install -y nodejs"
]

[phases.install]
cmds = [
  "pip install --no-cache-dir -r requirements.txt",
  "npm install --omit=dev"
]

[start]
cmd = "python main.py"
